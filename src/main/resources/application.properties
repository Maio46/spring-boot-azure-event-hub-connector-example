spring.application.name=spring-boot-azure-event-hub-connector-example

# Event Hubs Configuration for Local Emulator
spring.cloud.azure.eventhubs.namespace=emulatorNs1
spring.cloud.azure.eventhubs.event-hub-name=eh1
spring.cloud.azure.eventhubs.processor.checkpoint-store.account-name=devstoreaccount1
spring.cloud.azure.eventhubs.processor.checkpoint-store.container-name=eventhubs-checkpoint
spring.cloud.azure.eventhubs.processor.consumer-group=cg1

# Connection string for local emulator (AMQP)
spring.cloud.azure.eventhubs.connection-string=Endpoint=sb://localhost;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true

# Enable the processor to start listening
spring.cloud.azure.eventhubs.processor.enabled=true

# Storage account connection for checkpoints (Azurite)
spring.cloud.azure.storage.blob.connection-string=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://localhost:10000/devstoreaccount1
